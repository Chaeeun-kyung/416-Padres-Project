spring.application.name=padres-backend

# MongoDB connection string.
# Uses MONGODB_URI when provided; otherwise falls back to the local padres database.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/padres}

# Lets Spring create the declared Mongo indexes at startup.
spring.data.mongodb.auto-index-creation=true

# Uses Spring's built-in in-memory cache for repeated read-only service calls.
spring.cache.type=simple

# When true, seeds MongoDB from the bundled preprocessed JSON files on startup.
# In this project, Mongo acts as the runtime read store for those precomputed files.
app.seed.preprocessed-data-on-startup=${APP_SEED_PREPROCESSED_DATA_ON_STARTUP:true}