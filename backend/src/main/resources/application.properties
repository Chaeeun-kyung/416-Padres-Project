spring.application.name=padres-backend

# Configure with your local MongoDB URI or Atlas URI via environment variable.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/padres}
spring.data.mongodb.auto-index-creation=true

# Seeds MongoDB from bundled preprocessed JSON resources at startup.
app.seed.preprocessed-data-on-startup=${APP_SEED_PREPROCESSED_DATA_ON_STARTUP:true}

# EI and ensemble resources are currently synthetic/demo placeholders.
# Keep this false until SeaWulf-generated outputs replace them.
app.seed.synthetic-analysis-data-on-startup=${APP_SEED_SYNTHETIC_ANALYSIS_DATA_ON_STARTUP:false}
